services:
  helm:
    build: .
    container_name: helm
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Persistent data: SQLite DB + uploaded attachments
      - ./data:/data
      # Config file mounted read-only
      - ./config.yml:/config/config.yml:ro
    environment:
      - TZ=America/New_York
