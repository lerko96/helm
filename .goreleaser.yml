version: 2

before:
  hooks:
    - go mod download
    - sh -c "cd web && npm ci && npm run build"

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    # Raspberry Pi Zero (original) uses armv6 — skipped; v2/Zero 2 W and later
    # are all armv7+. Matrix-level exclusion so darwin and linux get the full
    # set without emitting darwin/arm.
    ignore:
      - goos: darwin
        goarch: arm
    main: ./cmd/helm
    binary: helm
    ldflags:
      - -s -w

archives:
  - name_template: "helm_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - config.example.yml
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "helm_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  disable: true
