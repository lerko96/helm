server:
  host: 0.0.0.0   # bind address; use 127.0.0.1 if behind a reverse proxy
  port: 8080

auth:
  # REQUIRED. Password for logging in to the dashboard.
  password: changeme
  # REQUIRED. Secret used to sign JWT tokens. Must be at least 32 characters.
  # Changing this value invalidates all active sessions — users must log in again.
  # CalDAV source passwords are encrypted with a key derived from this secret;
  # rotating it means you must re-enter CalDAV passwords in the cal-sources widget.
  # Generate a strong secret with: openssl rand -hex 32
  secret: replace-with-a-long-random-string

storage:
  # Path to the SQLite database file. Created automatically if it doesn't exist.
  db_path: ./data/helm.db
  # Directory where uploaded attachments are stored. Created automatically.
  attachments_path: ./data/attachments

# Dashboard layout — pages contain columns, columns contain widgets stacked top to bottom.
# Pages are rendered as tabs in the header navigation.
# Column sizes: small (~25%), medium (~33%), large (~50%)
# All widget types: memos, todos, task-board, task-lists, notes-editor, notes-folders,
#                   cal-view, cal-sources, bookmarks, clipboard, tags
pages:
  - name: Home
    columns:
      - size: small
        widgets:
          - type: memos
            config:
              limit: 15         # max items to show (optional, default: unlimited)
          - type: todos
            config:
              filter: today     # today | all | pinned (optional, default: all)
      - size: large
        widgets:
          - type: cal-view
      - size: small
        widgets:
          - type: notes-editor
          - type: bookmarks
          - type: clipboard
            config:
              limit: 5
