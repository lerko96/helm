version: 2

before:
  hooks:
    - go mod download
    - sh -c "cd web && npm ci && npm run build"

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/helm
    binary: helm
    ldflags:
      - -s -w

archives:
  - name_template: "helm_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - config.example.yml
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "helm_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  disable: true
